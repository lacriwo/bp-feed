name: Update Feed

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate patched feed
        env:
          SOURCE_FEED_URL: ${{ secrets.SOURCE_FEED_URL }}
          TARGET_URL: https://ligo-polyanka.ru
          OUTPUT_FILE: docs/bp-yandex-patched.xml
          REQUEST_TIMEOUT: "90"
          MAX_RETRIES: "3"
        run: python scripts/update_feed.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/bp-yandex-patched.xml
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "Update patched feed"
            git push origin HEAD:${{ github.ref_name }}
          fi
